# ─────────────────────────────────────────────────────────────────────────────
# Purpose:
# Generate a CycloneDX JSON SBOM for either an npm or NuGet target and upload it
# to Dependency-Track. The project version is set to $(Build.BuildNumber) so each
# pipeline run creates a versioned snapshot.
#
# Requirements:
# The pipeline must provide dependencyTrackUrl and dependencyTrackApiKey, for
# example through a variable group such as DependencyTrackGroup.
#
# Steps:
# 1. Install the required SBOM tool for the selected target type.
# 2. Generate the SBOM in CycloneDX JSON format.
# 3. Upload the SBOM to Dependency-Track.
# 4. Optionally publish the SBOM directory as a pipeline artifact.
# ─────────────────────────────────────────────────────────────────────────────

parameters:
  - name: targetType
    type: string
    default: npm
    values:
      - npm
      - nuget
  - name: applicationName
    type: string
  - name: applicationComponentName
    type: string
  - name: workingDirectory
    type: string
    default: "$(Build.SourcesDirectory)/frontend"
  - name: targetFile
    type: string
    default: "$(Build.SourcesDirectory)/frontend/package-lock.json"
  - name: sbomOutputDirectory
    type: string
    default: "$(Build.SourcesDirectory)/frontend/public/.well-known/sbom"
  - name: sbomFileName
    type: string
    default: "bom.json"
  - name: publishSbomArtifact
    type: boolean
    default: true

steps:
  # IF NPM, then CycloneDX Node.js tool
  - ${{ if eq(parameters.targetType, 'npm') }}:
      - script: |
          export FETCH_LICENSE=true
          export GITHUB_TOKEN=$(githubPat)

          # npm install -g @cyclonedx/cyclonedx-npm
          npm install -g @cyclonedx/cdxgen

          mkdir -p "${{ parameters.sbomOutputDirectory }}"

          # cyclonedx-npm \
          #   --output-format JSON \
          #   --output-file "${{ parameters.workingDirectory }}/${{ parameters.sbomFileName }}" \
          #   --version "$(Build.BuildNumber)"

          cdxgen \
            --input "${{ parameters.targetFile }}" \
            --output "${{ parameters.sbomOutputDirectory }}/${{ parameters.sbomFileName }}" \
            --format cyclonedx-json \
            --project-name "${{ parameters.applicationName }}-${{ parameters.applicationComponentName }}" \
            --project-version "$(Build.BuildNumber)" \
            --author "sroede" \
            --git-branch "$(Build.SourceBranchName)" \
            --git-commit "$(Build.SourceVersion)"

          HTTP_STATUS=$(curl -X POST '$(dependencyTrackUrl)/api/v1/bom' \
              -H 'X-Api-Key: $(dependencyTrackApiKey)' \
              -H 'Content-Type: multipart/form-data' \
              -F 'projectName="${{ parameters.applicationName }}-${{ parameters.applicationComponentName }}"' \
              -F 'projectVersion="$(Build.BuildNumber)"' \
              -F 'autoCreate=true' \
              -F 'bom=@${{ parameters.sbomOutputDirectory }}/${{ parameters.sbomFileName }}' \
              -w '%{response_code}' \
              -v --ssl-no-revoke)

          echo "Dependency-Track response (HTTP ${HTTP_STATUS})"
        workingDirectory: "${{ parameters.workingDirectory }}"
        displayName: "Generate SBOM (cdxgen) and upload to Dependency-Track"
        continueOnError: true

  # IF NUGET, the CycloneDX .NET global tool
  - ${{ if eq(parameters.targetType, 'nuget') }}:
      - script: |
          dotnet tool install --global CycloneDX --version 6.2.0

          mkdir -p "${{ parameters.sbomOutputDirectory }}"

          dotnet CycloneDX "${{ parameters.targetFile }}" \
            -F Json \
            -o "${{ parameters.sbomOutputDirectory }}" \
            -fn "${{ parameters.sbomFileName }}" \
            -sn "${{ parameters.applicationName }}-${{ parameters.applicationComponentName }}" \
            -sv "$(Build.BuildNumber)" \
            --enable-github-licenses --github-bearer-token $(githubPat)

          HTTP_STATUS=$(curl -X POST '$(dependencyTrackUrl)/api/v1/bom' \
              -H 'X-Api-Key: $(dependencyTrackApiKey)' \
              -H 'Content-Type: multipart/form-data' \
              -F 'projectName="${{ parameters.applicationName }}-${{ parameters.applicationComponentName }}"' \
              -F 'projectVersion="$(Build.BuildNumber)"' \
              -F 'autoCreate=true' \
              -F 'bom=@${{ parameters.sbomOutputDirectory }}/${{ parameters.sbomFileName }}' \
              -w '%{response_code}' \
              -v --ssl-no-revoke)

          echo "Dependency-Track response (HTTP ${HTTP_STATUS})"
        displayName: "Generate SBOM (CycloneDX) and upload to Dependency-Track"
        continueOnError: true

  # Publish the SBOM directory as a pipeline artifact
  - ${{ if eq(parameters.publishSbomArtifact, true) }}:
      - task: PublishPipelineArtifact@1
        displayName: "Publish SBOM artifact"
        inputs:
          targetPath: "${{ parameters.sbomOutputDirectory }}"
          artifact: "sbom-${{ parameters.applicationComponentName }}"
          publishLocation: "pipeline"
